server.port=8080
tour.service.url=${TOUR_SERVICE_URL:http://tour-service:8080}

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:purchases}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:super}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate ne kreira/mijenja tabele — Flyway preuzima tu odgovornost
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — pri svakom startu automatski primijeni nove migracije iz db/migration/
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Inter-service komunikacija (HTTP — za validaciju pri dodavanju u korpu)
tour.service.base-url=http://tour-service:8080

# RabbitMQ — SAGA Choreography messaging
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Distributed Tracing — Zipkin
spring.application.name=purchase-service
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans
