server.port=8080

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:tours}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:super}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate ne kreira/mijenja tabele — Flyway preuzima tu odgovornost
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — pri svakom startu automatski primijeni nove migracije iz db/migration/
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Postojeca baza nema flyway_schema_history — reci Flywayu da je V1 vec primijenjen
# i samo kreiraj history tabelu od sad. Na svjezoj bazi ovo nema efekta (V1 se izvrsi normalno).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Inter-service komunikacija
purchase.service.base-url=${PURCHASE_SERVICE_URL:http://purchase-service:8080}

# RabbitMQ — SAGA Choreography messaging
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Distributed Tracing — Zipkin
spring.application.name=tour-service
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

# gRPC server port
grpc.server.port=9090
grpc.server.address=0.0.0.0

# Jackson: serialize dates as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
