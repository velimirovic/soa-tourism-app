server.port=8080

spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:tours}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:super}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate ne kreira/mijenja tabele — Flyway preuzima tu odgovornost
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — pri svakom startu automatski primijeni nove migracije iz db/migration/
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Postojeca baza nema flyway_schema_history — reci Flywayu da je V1 vec primijenjen
# i samo kreiraj history tabelu od sad. Na svjezoj bazi ovo nema efekta (V1 se izvrsi normalno).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
