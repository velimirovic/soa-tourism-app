services:

  # ── API Gateway (Go) ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - application
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      JWT_KEY: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:80
      BLOG_SERVICE_URL: http://blog-service:3001
      TOUR_SERVICE_URL: http://tour-service:8080
      STAKEHOLDERS_SERVICE_URL: http://stakeholders-service:80
      FOLLOWERS_SERVICE_URL: http://followers-service:8084
    depends_on:
      - auth-service
      - blog-service
      - tour-service
      - stakeholders-service
      - followers-service

  stakeholders-service:
    build:
      context: ./stakeholders-service/StakeholdersService
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - application
    ports:
      - "8081:80"
    environment:
      DATABASE_HOST: stakeholders-db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: stakeholders
      JWT_KEY: ${JWT_SECRET}
      JWT_ISSUER: AuthService
      AUTH_SERVICE_URL: http://auth-service:80
    depends_on:
      - stakeholders-db
      - auth-service

  stakeholders-db:
    image: postgres:16
    restart: always
    networks:
      - application
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: stakeholders
    ports:
      - "5433:5432"
    volumes:
      - stakeholders-db-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./auth-service/AuthService
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - application
    ports:
      - "8082:80"
    environment:
      DATABASE_HOST: auth-db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: auth
      JWT_KEY: ${JWT_SECRET}
      JWT_ISSUER: AuthService
    depends_on:
      - auth-db

  auth-db:
    image: postgres:16
    restart: always
    networks:
      - application
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth
    ports:
      - "5435:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  tour-service:
    build:
      context: ./tour-service
    restart: on-failure
    networks:
      - application
    ports:
      - "8083:8080"
    environment:
      DATABASE_HOST: tour-db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DATABASE_NAME: tours
    depends_on:
      - tour-db

  tour-db:
    image: postgres:16
    restart: always
    networks:
      - application
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tours
    ports:
      - "5434:5432"
    volumes:
      - tour-db-data:/var/lib/postgresql/data

  blog-service:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - application
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://blog-db:27017/blog
      JWT_SECRET: ${JWT_SECRET}
      FOLLOWERS_SERVICE_URL: http://followers-service:8084
    depends_on:
      - blog-db
      - followers-service

  blog-db:
    image: mongo:7
    restart: always
    networks:
      - application
    ports:
      - "27017:27017"
    volumes:
      - blog-db-data:/data/db

  # ── Followers Service (Go) ───────────────────────────────────────
  followers-service:
    build:
      context: ./followers-service
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - application
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      JWT_SECRET: ${JWT_SECRET}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5
    restart: always
    networks:
      - application
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  tourism-frontend:
    build:
      context: ./tourism-frontend/tourism-frontend
      dockerfile: Dockerfile
    restart: on-failure
    networks:
      - application
    ports:
      - "4200:80"

networks:
  application:
    driver: bridge

volumes:
  stakeholders-db-data:
  auth-db-data:
  tour-db-data:
  blog-db-data:
  neo4j-data:
