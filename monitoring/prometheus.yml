global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # HOST metrike (CPU, RAM, fajl sistem, mreza)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Kontejner metrike preko cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Docker daemon metrike (alternativa za Windows)
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
