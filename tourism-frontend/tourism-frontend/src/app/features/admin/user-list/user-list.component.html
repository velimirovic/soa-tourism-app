<div class="user-list">
  <h2 class="user-list__title">User Management</h2>

  <div *ngIf="error" class="user-list__state user-list__state--error">{{ error }}</div>

  <ng-container *ngIf="users$ | async as users; else loadingTpl">
    <table class="user-list__table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Blocked</th>
          <th>Registered</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.id }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="user-list__badge user-list__badge--{{ user.role.toLowerCase() }}">
              {{ user.role }}
            </span>
          </td>
          <td>
            <span [class]="user.isBlocked ? 'user-list__status--blocked' : 'user-list__status--active'">
              {{ user.isBlocked ? 'Yes' : 'No' }}
            </span>
          </td>
          <td>{{ user.createdAt | date: 'dd.MM.yyyy HH:mm' }}</td>
        </tr>
      </tbody>
    </table>
  </ng-container>

  <ng-template #loadingTpl>
    <div *ngIf="!error" class="user-list__state">Loading...</div>
  </ng-template>
</div>
