<aside class="sidebar">

  <!-- Logo -->
  <div class="sidebar__logo">
    <div class="sidebar__logo-icon">
      <span class="material-icons">explore</span>
    </div>
    <span class="sidebar__logo-text">TourFlo</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">

    <!-- Home — always visible -->
    <a routerLink="/home" routerLinkActive="sidebar__nav-item--active"
       [routerLinkActiveOptions]="{ exact: true }" class="sidebar__nav-item">
      <span class="material-icons sidebar__nav-icon">home</span>
      <span class="sidebar__nav-label">Home</span>
    </a>

    <!-- Auth-required items -->
    <ng-container *ngIf="isLoggedIn">
      <a routerLink="/blogs" routerLinkActive="sidebar__nav-item--active" class="sidebar__nav-item">
        <span class="material-icons sidebar__nav-icon">article</span>
        <span class="sidebar__nav-label">Blogs</span>
      </a>

      <a routerLink="/people" routerLinkActive="sidebar__nav-item--active" class="sidebar__nav-item">
        <span class="material-icons sidebar__nav-icon">group</span>
        <span class="sidebar__nav-label">People</span>
      </a>

      <!-- Tours — Guide sees "My Tours" pointing to /tours/my; Tourist sees "Tours" pointing to /tours -->
      <a
        [routerLink]="toursRoute"
        routerLinkActive="sidebar__nav-item--active"
        class="sidebar__nav-item"
      >
        <span class="material-icons sidebar__nav-icon">map</span>
        <span class="sidebar__nav-label">{{ isGuide ? 'My Tours' : 'Tours' }}</span>
      </a>

      <!-- Position simulator — Tourist only -->
      <a *ngIf="isTourist" routerLink="/simulator" routerLinkActive="sidebar__nav-item--active" class="sidebar__nav-item">
        <span class="material-icons sidebar__nav-icon">location_searching</span>
        <span class="sidebar__nav-label">Simulator</span>
      </a>

      <a routerLink="/profile" routerLinkActive="sidebar__nav-item--active" class="sidebar__nav-item">
        <span class="material-icons sidebar__nav-icon">account_circle</span>
        <span class="sidebar__nav-label">Me</span>
      </a>
    </ng-container>

    <!-- Admin section -->
    <ng-container *ngIf="isAdmin">
      <div class="sidebar__divider"></div>
      <a routerLink="/admin/users" routerLinkActive="sidebar__nav-item--active"
         class="sidebar__nav-item sidebar__nav-item--admin">
        <span class="material-icons sidebar__nav-icon">manage_accounts</span>
        <span class="sidebar__nav-label">Users</span>
      </a>
    </ng-container>

  </nav>

  <!-- Footer: Login/Register or Logout -->
  <div class="sidebar__footer">

    <ng-container *ngIf="!isLoggedIn; else loggedInFooter">
      <a routerLink="/login" class="sidebar__footer-btn sidebar__footer-btn--login">
        <span class="material-icons">login</span>
        <span>Login</span>
      </a>
      <a routerLink="/register" class="sidebar__footer-btn sidebar__footer-btn--register">
        <span class="material-icons">person_add</span>
        <span>Register</span>
      </a>
    </ng-container>

    <ng-template #loggedInFooter>
      <button class="sidebar__footer-btn sidebar__footer-btn--logout" (click)="logout()">
        <span class="material-icons">logout</span>
        <span>Logout</span>
      </button>
    </ng-template>

  </div>

</aside>
